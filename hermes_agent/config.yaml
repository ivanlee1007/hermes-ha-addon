name: Hermes Agent
version: "0.4.3"
slug: hermes_agent
description: "NousResearch Hermes Agent - persistent AI agent with memory, skills, and multi-platform messaging"
url: "https://github.com/NousResearch/hermes-agent"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 48099
panel_icon: mdi:robot-outline
panel_title: Hermes Agent
map:
  - type: config
    read_only: false
ports:
  8080/tcp: 8080
  8443/tcp: 8443
ports_description:
  8080/tcp: "HTTP access (terminal + API)"
  8443/tcp: "HTTPS access (terminal + API)"
options:
  hermes_home: ".hermes"
  git_url: "https://github.com/NousResearch/hermes-agent.git"
  git_ref: "main"
  git_token: ""
  auto_update: false
  timezone: "Europe/Berlin"
  force_ipv4_dns: true
  homeassistant_token: ""
  hass_url: "http://homeassistant.local:8123"
  env_vars: []
schema:
  hermes_home: "str"
  git_url: "url?"
  git_ref: "str?"
  git_token: "password?"
  auto_update: "bool"
  timezone: "str"
  force_ipv4_dns: "bool"
  homeassistant_token: "password?"
  hass_url: "url?"
  env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]{0,254}$)"
      value: "str"
