name: Hermes Agent
version: "0.2.5"
slug: hermes_agent
description: "NousResearch Hermes Agent - persistent AI agent with memory, skills, and multi-platform messaging"
url: "https://github.com/NousResearch/hermes-agent"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 0
ingress_stream: true
panel_icon: mdi:robot-outline
panel_title: Hermes Agent
hassio_api: true
map:
  - type: config
    read_only: false
options:
  git_url: "https://github.com/NousResearch/hermes-agent.git"
  git_ref: "main"
  git_token: ""
  auto_update: false
  timezone: "Europe/Berlin"
  force_ipv4_dns: true
  auto_setup: true
  homeassistant_token: ""
  hass_url: "http://homeassistant.local:8123"
  nginx_log_level: "minimal"
  env_vars: []
schema:
  git_url: "url?"
  git_ref: "str?"
  git_token: "password?"
  auto_update: "bool"
  timezone: "str"
  force_ipv4_dns: "bool"
  auto_setup: "bool"
  homeassistant_token: "password?"
  hass_url: "url?"
  nginx_log_level: "list(off|minimal|full)"
  env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]{0,254}$)"
      value: "str"
