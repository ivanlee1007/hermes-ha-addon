name: Hermes Agent
version: "1.0.7"
slug: hermes_agent
description: "The self-improving AI agent built by Nous Research. Home Assistant add-on by Wolfram Ravenwolf."
url: "https://github.com/WolframRavenwolf/hermes-ha-addon"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 49169
panel_icon: mdi:robot
panel_title: Hermes Agent
map:
  - addon_config:rw
  - media:rw
  - share:rw
ports:
  8080/tcp: null
  8443/tcp: 8443
ports_description:
  8080/tcp: "HTTP: /hermes/ (agent) · /dashboard/ (dashboard) · /webui/ (Hermes WebUI) · /terminal/ (shell) · /v1/ (OpenAI API)"
  8443/tcp: "HTTPS: /hermes/ (agent) · /dashboard/ (dashboard) · /webui/ (Hermes WebUI) · /terminal/ (shell) · /v1/ (OpenAI API) — TLS (self-signed cert)"
options:
  git_url: "https://github.com/NousResearch/hermes-agent.git"
  git_ref: "04918345ea31b1106d2ee6d4f42822f4f57616ee"
  git_token: ""
  auto_update: false
  hass_url: "http://homeassistant.local:8123"
  homeassistant_token: ""
  hermes_home: ".hermes"
  enable_dashboard: false
  enable_webui: true
  webui_git_url: "https://github.com/nesquena/hermes-webui.git"
  webui_git_ref: "a8de4e7c0a29750fc9a2e83e2ad8eed324b0467e"
  enable_terminal: false
  enable_api: false
  access_password: ""
  env_vars:
    - name: "OPENROUTER_API_KEY"
      value: ""
schema:
  git_url: "url?"
  git_ref: "str?"
  git_token: "password?"
  auto_update: "bool"
  hass_url: "url?"
  homeassistant_token: "password?"
  hermes_home: "str?"
  enable_dashboard: "bool"
  enable_webui: "bool"
  webui_git_url: "url?"
  webui_git_ref: "str?"
  enable_terminal: "bool"
  enable_api: "bool"
  access_password: "password?"
  env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]{0,254}$)"
      value: "str"
