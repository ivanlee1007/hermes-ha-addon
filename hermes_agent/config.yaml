name: Hermes Agent
version: "0.9.11"
slug: hermes_agent
description: "The self-improving AI agent built by Nous Research. Home Assistant add-on by Wolfram Ravenwolf."
url: "https://github.com/WolframRavenwolf/hermes-ha-addon"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 49169
panel_icon: mdi:robot
panel_title: Hermes Agent
map:
  - addon_config:rw
  - media:rw
  - share:rw
ports:
  8080/tcp: 8080
  8443/tcp: 8443
ports_description:
  8080/tcp: "HTTP: /hermes/ (agent) · /terminal/ (shell) · /v1/ (OpenAI API)"
  8443/tcp: "HTTPS: same paths as HTTP, with TLS (self-signed cert)"
options:
  git_url: "https://github.com/NousResearch/hermes-agent.git"
  git_ref: ""
  git_token: ""
  auto_update: false
  hass_url: "http://homeassistant.local:8123"
  homeassistant_token: ""
  hermes_home: ".hermes"
  prefer_ipv4_dns: true
  env_vars:
    - name: "OPENROUTER_API_KEY"
      value: ""
schema:
  git_url: "url?"
  git_ref: "str?"
  git_token: "password?"
  auto_update: "bool"
  hass_url: "url?"
  homeassistant_token: "password?"
  hermes_home: "str?"
  prefer_ipv4_dns: "bool"
  env_vars:
    - name: "match(^[A-Z_][A-Z0-9_]{0,254}$)"
      value: "str"
