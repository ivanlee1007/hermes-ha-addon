<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="10">
<title>Hermes Agent</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#111111;color:#e6edf3;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{display:flex;align-items:center;justify-content:center}
  .loading{text-align:center}
  .loading h2{margin:0 0 12px;font-size:18px}
  .loading p{color:#9ca3af;font-size:14px;margin:0}
  .spinner{width:40px;height:40px;margin:20px auto;border:3px solid #1f2937;border-top-color:#ffd700;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading">
  <h2 style="color:#f5d939">Hermes Agent</h2>
  <div class="spinner"></div>
  <p style="color:#efb231">Loading, please wait...</p>
  <p style="color:#61591e;font-size:12px;margin-top:8px">This page refreshes automatically.</p>
</div>
</body>
</html>
